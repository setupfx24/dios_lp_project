name: lp-platform

x-common-env: &common-env
  NODE_ENV: development
  LOG_LEVEL: info

services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_BOOTSTRAP_PW:-bootstrap_pw}
      POSTGRES_DB: lp
      LP_OWNER_PW: ${LP_OWNER_PW:-owner_pw}
      LP_APP_PW: ${LP_APP_PW:-changeme_in_compose_env}
      LP_RO_PW: ${LP_RO_PW:-ro_pw}
    command: >
      postgres
      -c lp.owner_pw=${LP_OWNER_PW:-owner_pw}
      -c lp.app_pw=${LP_APP_PW:-changeme_in_compose_env}
      -c lp.ro_pw=${LP_RO_PW:-ro_pw}
    ports: ['55432:5432']
    volumes:
      - postgres-data:/home/postgres/pgdata/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d lp']
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [lp-net]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports: ['56379:6379']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [lp-net]

  pgadmin:
    image: dpage/pgadmin4:8.12
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PW:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports: ['5050:80']
    depends_on:
      postgres:
        condition: service_healthy
    networks: [lp-net]

  redis-commander:
    image: rediscommander/redis-commander:latest
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports: ['8081:8081']
    depends_on:
      redis:
        condition: service_healthy
    networks: [lp-net]

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      PORT: 3000
      DATABASE_URL: postgres://lp_app:${LP_APP_PW:-changeme_in_compose_env}@postgres:5432/lp
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-devsecret_at_least_32_characters_long}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-devadminsecret_at_least_32_characters_long}
      # Admin JWT lifetime (default is 15m which logs API calls out mid-session
      # since there's no refresh flow). Match the 12h session cap for local use.
      ADMIN_JWT_EXPIRY: 12h
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY:-devkey_at_least_32_characters_long_for_aes_gcm}
      ROUTES_ENABLED: ${ROUTES_ENABLED:-all}
      CORS_ORIGINS: http://localhost:3001,http://localhost:3002
      SWAGGER_ENABLED: 'true'
      # Empty by default (host-only cookie). Prod sets one via --env-file so the
      # auth cookies are shared across trade.*/admin.*/api.* subdomains.
      # COOKIE_DOMAIN is canonical; ADMIN_COOKIE_DOMAIN is the legacy fallback.
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      ADMIN_COOKIE_DOMAIN: ${ADMIN_COOKIE_DOMAIN:-}
    ports: ['3000:3000']
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/health']
      interval: 10s
      timeout: 5s
      retries: 6
    networks: [lp-net]

  workers:
    build:
      context: ../..
      dockerfile: apps/workers/Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      DATABASE_URL: postgres://lp_app:${LP_APP_PW:-changeme_in_compose_env}@postgres:5432/lp
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks: [lp-net]

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_WS_URL: http://localhost:3000
      PORT: '3001'
      HOSTNAME: 0.0.0.0
    ports: ['3001:3001']
    depends_on:
      api:
        condition: service_healthy
    networks: [lp-net]

  admin:
    build:
      context: ../..
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3000
      PORT: '3002'
      HOSTNAME: 0.0.0.0
    ports: ['3002:3002']
    depends_on:
      api:
        condition: service_healthy
    networks: [lp-net]

volumes:
  postgres-data: {}
  redis-data: {}

networks:
  lp-net:
    driver: bridge
