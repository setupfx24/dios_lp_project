name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm --filter "@lp/*" --filter "!@lp/web" --filter "!@lp/admin" --filter "!@lp/api" --filter "!@lp/workers" build

      - name: Lint
        run: pnpm -r lint

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build apps
        run: pnpm -r build

      - name: Unit tests
        run: pnpm -r test

      - name: E2E tests (testcontainers)
        run: pnpm --filter @lp/api test:e2e
        env:
          # GitHub Actions ubuntu-latest has Docker pre-installed and reachable
          # via /var/run/docker.sock — testcontainers detects this automatically.
          NODE_OPTIONS: --max-old-space-size=4096
